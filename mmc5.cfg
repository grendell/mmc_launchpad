MEMORY {
    ZP:  start = $00,   size = $0100, type = rw, file = "";
    RAM: start = $0200, size = $0600, type = rw, file = "";
    HDR: start = $0000, size = $0010, type = ro, file = %O, fill = yes, fillval = $00;
    PRG: start = $8000, size = $8000, type = ro, file = %O, fill = yes, fillval = $00;

    C00: start = $0000, size = $0800, type = ro, file = %O, fill = yes, fillval = $00;
    C01: start = $0000, size = $0800, type = ro, file = %O, fill = yes, fillval = $00;
    C02: start = $0000, size = $0800, type = ro, file = %O, fill = yes, fillval = $00;
    C03: start = $0000, size = $0800, type = ro, file = %O, fill = yes, fillval = $00;
