    C15: start = $0000, size = $0800, type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp;
    BSS:      load = RAM, type = bss;
    HEADER:   load = HDR, type = ro;
    CODE:     load = PRG, type = ro,  start = $e000;
    RODATA:   load = PRG, type = ro,  start = $f000;
    VECTORS:  load = PRG, type = ro,  start = $fffa;

    CHR00:    load = C00, type = ro,  optional = yes;
    CHR01:    load = C01, type = ro,  optional = yes;
    CHR02:    load = C02, type = ro,  optional = yes;
    CHR03:    load = C03, type = ro,  optional = yes;
    CHR04:    load = C04, type = ro,  optional = yes;
    CHR05:    load = C05, type = ro,  optional = yes;
    CHR06:    load = C06, type = ro;
    CHR07:    load = C07, type = ro,  optional = yes;
    CHR08:    load = C08, type = ro,  optional = yes;
    CHR09:    load = C09, type = ro,  optional = yes;
    CHR10:    load = C10, type = ro,  optional = yes;
    CHR11:    load = C11, type = ro,  optional = yes;
    CHR12:    load = C12, type = ro,  optional = yes;
    CHR13:    load = C13, type = ro,  optional = yes;
    CHR14:    load = C14, type = ro,  optional = yes;
    CHR15:    load = C15, type = ro,  optional = yes;
