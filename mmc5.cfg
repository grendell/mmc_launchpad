    C07: start = $0000, size = $0800, type = ro, file = %O, fill = yes, fillval = $00;
    C08: start = $0000, size = $0800, type = ro, file = %O, fill = yes, fillval = $00;
    C09: start = $0000, size = $0800, type = ro, file = %O, fill = yes, fillval = $00;
    C10: start = $0000, size = $0800, type = ro, file = %O, fill = yes, fillval = $00;
